name: 'Build Tests'

on:
  pull_request:
    branches: [main]

jobs:
  build-targets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Release
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook
